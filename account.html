<script type="module">
  import { signIn, signUp, getCurrentUser } from "./js/auth.js";

  // Already logged in? bounce to home.
  const existing = await getCurrentUser();
  if (existing) window.location.href = "index.html";

  const tabLogin = document.getElementById("tabLogin");
  const tabSignup = document.getElementById("tabSignup");
  const submitBtn = document.getElementById("submitBtn");
  const form = document.getElementById("authForm");
  const errorEl = document.getElementById("authError");
  const usernameEl = document.getElementById("username");
  const passwordEl = document.getElementById("password");

  let mode = new URLSearchParams(window.location.search).get("mode") === "signup" ? "signup" : "login";

  function updateMode() {
    errorEl.textContent = "";
    if (mode === "login") {
      tabLogin.classList.add("active");
      tabSignup.classList.remove("active");
      submitBtn.textContent = "Log in";
      passwordEl.autocomplete = "current-password";
    } else {
      tabSignup.classList.add("active");
      tabLogin.classList.remove("active");
      submitBtn.textContent = "Sign up";
      passwordEl.autocomplete = "new-password";
    }
  }
  updateMode();

  tabLogin.addEventListener("click", () => { mode = "login"; updateMode(); });
  tabSignup.addEventListener("click", () => { mode = "signup"; updateMode(); });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorEl.textContent = "";
    submitBtn.disabled = true;
    submitBtn.textContent = mode === "login" ? "Logging in…" : "Signing up…";

    const username = usernameEl.value.trim();
    const password = passwordEl.value;

    const { user, error } = mode === "login"
      ? await signIn(username, password)
      : await signUp(username, password);

    if (error) {
      errorEl.textContent = error.message;
      submitBtn.disabled = false;
      updateMode();
      return;
    }

    if (mode === "signup" && !user) {
      // Shouldn't normally happen with email confirmation disabled, but just in case
      errorEl.textContent = "Account created — try logging in now.";
      mode = "login";
      updateMode();
      submitBtn.disabled = false;
      return;
    }

    window.location.href = "index.html";
  });
</script>
