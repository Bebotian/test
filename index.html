<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bebotian</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<header class="topbar">
  <a href="index.html" class="logo">BEBOTIAN.NET</a>

  <nav class="pages">
    <a href="index.html" class="active">Home</a>
    <a href="mods.html">Mods</a>
    <a href="projects.html">Projects</a>
  </nav>

  <div class="socials">
    <a href="#">GH</a>
    <a href="#">YT</a>
    <a href="#">DC</a>
  </div>
</header>

<main>

  <h1>Latest Mods</h1>
  <div id="latest-mods" class="mods-grid"></div>

</main>

<script>
const supabase = window.supabase.createClient(
  "YOUR_URL",
  "YOUR_KEY"
);

async function loadLatestMods() {
  const { data } = await supabase
    .from("mods")
    .select("*")
    .order("created_at", { ascending: false })
    .limit(6);

  const container = document.getElementById("latest-mods");
  container.innerHTML = "";

  data.forEach(mod => {
    container.innerHTML += `
      <div class="mod-card">
        <img src="${mod.image}">
        <h3>${mod.name}</h3>
        <p>${mod.description}</p>
      </div>
    `;
  });
}

loadLatestMods();
</script>

</body>
</html>
