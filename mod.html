<script type="module">
  import { fetchModById } from "./js/supabase-mods.js";

  const GAME_LABEL = { minecraft: "Minecraft", gd: "Geometry Dash" };
  const LOADER_LABEL = { neoforge: "NeoForge", forge: "Forge", fabric: "Fabric", quilt: "Quilt" };
  const STATUS_LABEL = { released: "Released", beta: "Beta", alpha: "Alpha", indev: "In development" };
  const ICONS = {
    minecraft: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3 20 7.5v9L12 21 4 16.5v-9L12 3Z"/><path d="M4 7.5 12 12l8-4.5M12 12v9"/></svg>`,
    gd: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 4 3 20h18L12 4Z"/></svg>`
  };

  const container = document.getElementById("modDetail");
  const id = new URLSearchParams(window.location.search).get("id");

  function tagsHTML(mod) {
    let html = `<span class="tag ${mod.game === "minecraft" ? "mc" : "gd"}">${GAME_LABEL[mod.game] || mod.game}</span>`;
    if (mod.loader) html += `<span class="tag loader">${LOADER_LABEL[mod.loader] || mod.loader}</span>`;
    if (mod.mc_version) html += `<span class="tag mcver">${mod.mc_version}</span>`;
    return html;
  }

  if (!id) {
    container.innerHTML = `<p style="color:var(--muted);">No mod specified. <a href="mods.html" style="color:var(--blue);">Browse all mods →</a></p>`;
  } else {
    const { data: mod, error } = await fetchModById(id);

    if (error || !mod) {
      container.innerHTML = `<p style="color:var(--muted);">Couldn't find that mod. <a href="mods.html" style="color:var(--blue);">Browse all mods →</a></p>`;
    } else {
      document.title = `Bebotian.net — ${mod.name}`;
      const statusLabel = STATUS_LABEL[mod.status] || mod.status;
      const icon = ICONS[mod.game] || ICONS.minecraft;

      const dl = mod.status === "released" && mod.download_url
        ? `<a class="btn btn-primary" href="${mod.download_url}" target="_blank" rel="noopener">Download</a>`
        : `<button class="btn btn-ghost" disabled style="cursor:not-allowed;opacity:0.6;">Coming soon</button>`;

      container.innerHTML = `
        <a href="mods.html" class="back-link">&larr; Back to mods</a>
        <div class="mod-detail-grid">
          <div>
            <div class="mod-icon-large">${icon}</div>
            <div class="card-tags">${tagsHTML(mod)}</div>
            <h1>${mod.name}</h1>
            <p class="mod-description">${mod.description || "No description yet."}</p>
          </div>
          <div class="info-card mod-sidebar">
            <h3>Details</h3>
            <ul class="info-list">
              <li><span>Status</span><span>${statusLabel}</span></li>
              <li><span>Game</span><span>${GAME_LABEL[mod.game] || mod.game}</span></li>
              ${mod.loader ? `<li><span>Loader</span><span>${LOADER_LABEL[mod.loader] || mod.loader}</span></li>` : ""}
              ${mod.mc_version ? `<li><span>Version</span><span>${mod.mc_version}</span></li>` : ""}
            </ul>
            ${dl}
          </div>
        </div>`;
    }
  }
</script>
