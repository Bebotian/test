<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mods</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<header class="topbar">
  <a href="index.html" class="logo">BEBOTIAN.NET</a>

  <nav class="pages">
    <a href="index.html">Home</a>
    <a href="mods.html" class="active">Mods</a>
    <a href="projects.html">Projects</a>
  </nav>

  <div class="socials">
    <a href="#">GH</a>
    <a href="#">YT</a>
    <a href="#">DC</a>
  </div>
</header>

<main>

<h1>Mods</h1>

<!-- FILTERS -->
<div class="filters">
  <select id="filter-game">
    <option value="">Game</option>
    <option value="Minecraft">Minecraft</option>
  </select>

  <select id="filter-loader">
    <option value="">Loader</option>
    <option value="Forge">Forge</option>
    <option value="Fabric">Fabric</option>
  </select>

  <select id="filter-status">
    <option value="">Status</option>
    <option value="released">Released</option>
    <option value="beta">Beta</option>
    <option value="alpha">Alpha</option>
    <option value="indev">In Dev</option>
  </select>

  <button onclick="setView('grid')">Grid</button>
  <button onclick="setView('list')">List</button>
</div>

<div id="mods-container" class="mods-grid"></div>

</main>

<script>
const supabase = window.supabase.createClient(
  "https://xyxyjkngfkuaqxzpbyme.supabase.co/rest/v1/",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5eHlqa25nZmt1YXF4enBieW1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgyMzgsImV4cCI6MjA5OTE4NDIzOH0.jCvs1w9IDp8cRppddVj1Jun2_vS57jayGsClb8aDTGo"
);

async function loadMods() {
  let query = supabase.from("mods").select("*");

  const game = document.getElementById("filter-game").value;
  const loader = document.getElementById("filter-loader").value;
  const status = document.getElementById("filter-status").value;

  if (game) query = query.eq("game", game);
  if (loader) query = query.eq("loader", loader);
  if (status) query = query.eq("status", status);

  const { data } = await query;

  const container = document.getElementById("mods-container");
  container.innerHTML = "";

  data.forEach(mod => {
    container.innerHTML += `
      <div class="mod-card">
        <img src="${mod.image}">
        <h3>${mod.name}</h3>
        <p>${mod.description}</p>
        <div class="meta">
          ${mod.game} | ${mod.version} | ${mod.loader} | ${mod.status}
        </div>
      </div>
    `;
  });
}

function setView(mode) {
  const container = document.getElementById("mods-container");
  container.className = mode === "grid" ? "mods-grid" : "mods-list";
}

document.querySelectorAll("select").forEach(el => {
  el.addEventListener("change", loadMods);
});

loadMods();
</script>

</body>
</html>
