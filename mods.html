<div class="page-hero">
  <div class="eyebrow">// mod library</div>
  <h1>Mods</h1>
  <p>Browse everything — filter by game, version, loader, and development stage.</p>
</div>

<section class="section" style="padding-top:20px;">

  <!-- FILTER BAR -->
  <div class="filters">

    <select id="filter-game">
      <option value="">All Games</option>
      <option value="minecraft">Minecraft</option>
      <option value="gd">Geometry Dash</option>
    </select>

    <select id="filter-loader">
      <option value="">All Loaders</option>
      <option value="neoforge">NeoForge</option>
      <option value="forge">Forge</option>
      <option value="fabric">Fabric</option>
      <option value="quilt">Quilt</option>
    </select>

    <select id="filter-version">
      <option value="">All Versions</option>
      <option value="26.1.2">26.1.2</option>
      <option value="1.21.1">1.21.1</option>
    </select>

    <select id="filter-status">
      <option value="">All Status</option>
      <option value="released">Released</option>
      <option value="beta">Beta</option>
      <option value="alpha">Alpha</option>
      <option value="indev">In Dev</option>
    </select>

    <!-- VIEW MODE -->
    <div class="view-toggle">
      <button id="gridBtn" class="btn btn-ghost active">Grid</button>
      <button id="listBtn" class="btn btn-ghost">List</button>
    </div>

  </div>

  <!-- MODS (populated from Supabase, see js/supabase-mods.js) -->
  <div id="modsContainer" class="grid">
    <p style="color:var(--muted);">Loading mods…</p>
  </div>
</section>

<script type="module">
import { fetchMods, renderMods } from "./js/supabase-mods.js";

// FILTER LOGIC
const filters = {
  game: document.getElementById("filter-game"),
  loader: document.getElementById("filter-loader"),
  version: document.getElementById("filter-version"),
  status: document.getElementById("filter-status")
};

const container = document.getElementById("modsContainer");

function applyFilters() {
  const mods = container.querySelectorAll(".mod");
  mods.forEach(mod => {
    let show = true;

    if (filters.game.value && mod.dataset.game !== filters.game.value) show = false;
    if (filters.loader.value && mod.dataset.loader !== filters.loader.value) show = false;
    if (filters.version.value && mod.dataset.version !== filters.version.value) show = false;
    if (filters.status.value && mod.dataset.status !== filters.status.value) show = false;

    mod.style.display = show ? (container.classList.contains("list") ? "flex" : "block") : "none";
  });
}

Object.values(filters).forEach(f => f.addEventListener("change", applyFilters));

// Load mods from Supabase, render as cards, then let filters work as before
const mods = await fetchMods({ orderBy: "sort_order", ascending: true });
renderMods(container, mods, "mods", "No mods posted yet — first releases coming soon.");


// VIEW MODE
const gridBtn = document.getElementById("gridBtn");
const listBtn = document.getElementById("listBtn");

gridBtn.onclick = () => {
  container.classList.remove("list");
  container.classList.add("grid");
};

listBtn.onclick = () => {
  container.classList.remove("grid");
  container.classList.add("list");
};

</script>
