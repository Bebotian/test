<main>

<h1>Projects</h1>
<div id="projects-container" class="mods-grid"></div>

</main>

<script>
const supabase = window.supabase.createClient(
  "https://xyxyjkngfkuaqxzpbyme.supabase.co/rest/v1/",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5eHlqa25nZmt1YXF4enBieW1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgyMzgsImV4cCI6MjA5OTE4NDIzOH0.jCvs1w9IDp8cRppddVj1Jun2_vS57jayGsClb8aDTGo"
);

async function loadProjects() {
  const { data } = await supabase
    .from("projects")
    .select("*");

  const container = document.getElementById("projects-container");
  container.innerHTML = "";

  data.forEach(project => {
    container.innerHTML += `
      <div class="mod-card">
        <img src="${project.image}">
        <h3>${project.name}</h3>
        <p>${project.description}</p>
      </div>
    `;
  });
}

loadProjects();
</script>
